name: Agent - Run on Issue

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-agent:
    name: Run autonomous agent for Issue
    if: |
      (github.event_name == 'issues' && github.event.label && github.event.label.name == 'autofix') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/autofix'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Python deps for agent
        run: |
          python -m pip install --upgrade pip
          if [ -f agent/requirements.txt ]; then pip install -r agent/requirements.txt; fi

      - name: Extract TARGET_DIR from issue body or comment
        id: extract
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.issue ? context.payload.issue.body : (context.payload.comment ? context.payload.comment.body : '');
            const m = body.match(/path:\s*(.+)/i);
            const path = m ? m[1].trim() : '.';
            core.setOutput('path', path);

      - name: Run agent
        env:
          TARGET_DIR: ${{ steps.extract.outputs.path }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional model/third-party keys (set in repo secrets if used by agent):
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OTHER_MODEL_KEY: ${{ secrets.OTHER_MODEL_KEY }}
        run: |
          echo "Running agent in target dir: $TARGET_DIR"
          python agent/main.py
